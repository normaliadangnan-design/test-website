<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Profile Card</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    
    * {
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #0a0a0f 0%, #1a1625 50%, #0f0d1a 100%);
        min-height: 100vh;
        overflow-x: hidden;
    }

    .bg-anime {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
            radial-gradient(circle at 20% 50%, rgba(120, 60, 200, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(200, 60, 120, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 40% 20%, rgba(60, 120, 200, 0.1) 0%, transparent 50%);
        z-index: 0;
        pointer-events: none;
    }

    .card-wrapper {
        position: relative;
        z-index: 1;
    }

    .profile-card {
        background: rgba(22, 19, 32, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 
            0 20px 60px rgba(0, 0, 0, 0.5),
            0 0 100px rgba(138, 43, 226, 0.1) inset;
        transition: all 0.4s ease;
    }

    .profile-card:hover {
        transform: translateY(-5px);
        box-shadow: 
            0 25px 70px rgba(0, 0, 0, 0.6),
            0 0 120px rgba(138, 43, 226, 0.15) inset;
    }

    .banner {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        background-size: cover;
        background-position: center;
        height: 180px;
        position: relative;
        overflow: hidden;
    }

    .banner::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 0%, rgba(22, 19, 32, 0.8) 100%);
    }

    .avatar-wrapper {
        position: relative;
        width: 120px;
        height: 120px;
        margin-top: -60px;
    }

    .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 6px solid rgba(22, 19, 32, 0.9);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        object-fit: cover;
        position: relative;
        z-index: 2;
    }

    .avatar-decoration {
        position: absolute;
        top: -10%;
        left: -10%;
        width: 120%;
        height: 120%;
        z-index: 3;
        pointer-events: none;
        object-fit: contain;
    }

    .status-dot {
        position: absolute;
        bottom: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 5px solid rgba(22, 19, 32, 0.9);
        z-index: 4;
    }

    .status-online { background: #3ba55d; }
    .status-idle { background: #faa61a; }
    .status-dnd { background: #ed4245; }
    .status-offline { background: #747f8d; }

    .cat-ears {
        position: absolute;
        top: -20px;
        width: 100%;
        height: 40px;
        z-index: 1;
    }

    .cat-ear {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 22px solid transparent;
        border-right: 22px solid transparent;
        border-bottom: 32px solid rgba(255, 192, 203, 0.9);
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
    }

    .cat-ear::before {
        content: '';
        position: absolute;
        top: 10px;
        left: -14px;
        width: 0;
        height: 0;
        border-left: 14px solid transparent;
        border-right: 14px solid transparent;
        border-bottom: 20px solid #ff9eb5;
    }

    .cat-ear.left {
        left: 5px;
        transform: rotate(-15deg);
    }

    .cat-ear.right {
        right: 5px;
        transform: rotate(15deg);
    }

    .activity-card {
        background: rgba(30, 27, 43, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
    }

    .activity-card:hover {
        background: rgba(35, 32, 50, 0.8);
        border-color: rgba(138, 43, 226, 0.3);
        transform: translateX(4px);
    }

    .social-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: rgba(30, 27, 43, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .social-icon:hover {
        background: rgba(138, 43, 226, 0.3);
        border-color: rgba(138, 43, 226, 0.5);
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(138, 43, 226, 0.3);
    }

    .spotify-progress {
        background: rgba(255, 255, 255, 0.1);
        height: 4px;
        border-radius: 2px;
        overflow: hidden;
    }

    .spotify-progress-fill {
        background: #1db954;
        height: 100%;
        border-radius: 2px;
        transition: width 0.5s linear;
    }

    /* Loading Screen */
    .loader-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0a0f 0%, #1a1625 50%, #0f0d1a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loader-screen.hidden {
        opacity: 0;
        visibility: hidden;
    }

    .loader-logo {
        width: 80px;
        height: 80px;
        border: 4px solid rgba(138, 43, 226, 0.2);
        border-top: 4px solid #8a2be2;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
    }

    .loader-cat {
        position: absolute;
        font-size: 32px;
        animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
        animation: fadeIn 0.6s ease forwards;
    }

    .content-wrapper {
        opacity: 0;
    }

    .content-wrapper.loaded {
        opacity: 1;
        transition: opacity 0.5s ease 0.2s;
    }

    @media (max-width: 640px) {
        .profile-card {
            margin: 1rem;
        }
        .banner {
            height: 140px;
        }
        .avatar-wrapper {
            width: 100px;
            height: 100px;
            margin-top: -50px;
        }
        .avatar {
            width: 100px;
            height: 100px;
        }
    }
</style>
</head>
<body>
    <!-- Animated Loading Screen -->
    <div id="loader" class="loader-screen">
        <div style="position: relative;">
            <div class="loader-logo"></div>
            <div class="loader-cat">🐾</div>
        </div>
        <p class="text-purple-300 text-sm font-medium mt-4 tracking-wider">LOADING PROFILE...</p>
    </div>

    <div class="bg-anime"></div>

    <div class="min-h-screen flex items-center justify-center p-4">
        <div id="content" class="content-wrapper card-wrapper w-full max-w-md">
            <div class="profile-card rounded-3xl overflow-hidden fade-in">
                <!-- Banner -->
                <div id="banner" class="banner"></div>
                
                <!-- Profile Section -->
                <div class="px-6 pb-6">
                    <!-- Avatar with Cat Ears -->
                    <div class="flex items-start justify-between">
                        <div class="avatar-wrapper">
                            <div class="cat-ears">
                                <div class="cat-ear left"></div>
                                <div class="cat-ear right"></div>
                            </div>
                            <img id="avatar" src="" alt="Avatar" class="avatar">
                            <img id="avatarDecoration" src="" alt="" class="avatar-decoration" style="display: none;">
                            <div id="statusDot" class="status-dot status-offline"></div>
                        </div>
                    </div>

                    <!-- User Info -->
                    <div class="mt-4">
                        <div class="flex items-center gap-2 mb-1">
                            <h1 id="username" class="text-2xl font-bold text-white">Loading...</h1>
                            <span id="userBadges" class="flex gap-1"></span>
                        </div>
                        <p id="displayName" class="text-purple-300 text-sm font-medium"></p>
                        <p id="customStatus" class="text-gray-400 text-sm mt-2 flex items-center gap-2">
                            <span id="statusEmoji"></span>
                            <span id="statusText">ig muts sabay sleep call</span>
                        </p>
                    </div>

                    <!-- Divider -->
                    <div class="my-5 h-px bg-gradient-to-r from-transparent via-purple-500/30 to-transparent"></div>

                    <!-- Activities -->
                    <div id="activities" class="space-y-3">
                        <!-- Spotify Activity -->
                        <div id="spotifyActivity" class="activity-card rounded-xl p-4 hidden">
                            <div class="flex items-start gap-3">
                                <div class="flex-shrink-0">
                                    <div class="w-12 h-12 bg-[#1db954] rounded-lg flex items-center justify-center">
                                        <i class="fab fa-spotify text-white text-2xl"></i>
                                    </div>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 mb-1">
                                        <p class="text-xs text-gray-400 font-semibold uppercase tracking-wider">Listening to Spotify</p>
                                    </div>
                                    <p id="spotifySong" class="text-white font-semibold text-sm truncate"></p>
                                    <p id="spotifyArtist" class="text-gray-400 text-xs truncate"></p>
                                    <p id="spotifyAlbum" class="text-gray-500 text-xs truncate mt-0.5"></p>
                                    <div class="mt-2">
                                        <div class="spotify-progress">
                                            <div id="spotifyProgress" class="spotify-progress-fill" style="width: 0%"></div>
                                        </div>
                                        <div class="flex justify-between mt-1">
                                            <span id="spotifyTimeStart" class="text-xs text-gray-500">0:00</span>
                                            <span id="spotifyTimeEnd" class="text-xs text-gray-500">0:00</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Other Activities -->
                        <div id="otherActivities"></div>
                    </div>

                    <!-- Social Icons -->
                    <div class="mt-5 flex gap-3 justify-center flex-wrap">
                        <a href="#" class="social-icon" title="Discord">
                            <i class="fab fa-discord text-purple-400"></i>
                        </a>
                        <a href="#" class="social-icon" title="Twitter">
                            <i class="fab fa-twitter text-blue-400"></i>
                        </a>
                        <a href="#" class="social-icon" title="GitHub">
                            <i class="fab fa-github text-gray-300"></i>
                        </a>
                        <a href="#" class="social-icon" title="Instagram">
                            <i class="fab fa-instagram text-pink-400"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const USER_ID = '1250654354344775703';
    let spotifyInterval = null;

    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    function updateSpotifyProgress(start, end) {
        if (spotifyInterval) clearInterval(spotifyInterval);
        
        const updateProgress = () => {
            const now = Date.now();
            const elapsed = now - start;
            const total = end - start;
            const progress = Math.min((elapsed / total) * 100, 100);
            
            document.getElementById('spotifyProgress').style.width = `${progress}%`;
            document.getElementById('spotifyTimeStart').textContent = formatTime(elapsed);
            
            if (progress >= 100) {
                clearInterval(spotifyInterval);
            }
        };
        
        updateProgress();
        spotifyInterval = setInterval(updateProgress, 1000);
    }

    function renderUserData(data) {
        const { discord_user, discord_status, activities, spotify, listening_to_spotify } = data;

        // Avatar
        const avatarUrl = `https://cdn.discordapp.com/avatars/${USER_ID}/${discord_user.avatar}.${discord_user.avatar.startsWith('a_') ? 'gif' : 'png'}?size=512`;
        document.getElementById('avatar').src = avatarUrl;

        // Avatar Decoration
        if (discord_user.avatar_decoration_data) {
            const decorationUrl = `https://cdn.discordapp.com/avatar-decoration-presets/${discord_user.avatar_decoration_data.asset}.png`;
            const decorationEl = document.getElementById('avatarDecoration');
            decorationEl.src = decorationUrl;
            decorationEl.style.display = 'block';
        }

        // Banner
        if (discord_user.banner) {
            const bannerUrl = `https://cdn.discordapp.com/banners/${USER_ID}/${discord_user.banner}.${discord_user.banner.startsWith('a_') ? 'gif' : 'png'}?size=600`;
            document.getElementById('banner').style.backgroundImage = `url(${bannerUrl})`;
        }

        // Username & Display Name
        document.getElementById('username').textContent = discord_user.username;
        if (discord_user.global_name) {
            document.getElementById('displayName').textContent = discord_user.global_name;
        }

        // Status Dot
        const statusDot = document.getElementById('statusDot');
        statusDot.className = `status-dot status-${discord_status}`;

        // Custom Status
        const customActivity = activities.find(a => a.type === 4);
        if (customActivity) {
            if (customActivity.emoji) {
                const emojiText = customActivity.emoji.id 
                    ? `<img src="https://cdn.discordapp.com/emojis/${customActivity.emoji.id}.${customActivity.emoji.animated ? 'gif' : 'png'}" alt="${customActivity.emoji.name}" class="inline w-4 h-4">`
                    : customActivity.emoji.name;
                document.getElementById('statusEmoji').innerHTML = emojiText;
            }
            document.getElementById('statusText').textContent = customActivity.state || 'ig muts sabay sleep call';
        }

        // Spotify Activity
        if (listening_to_spotify && spotify) {
            const spotifyEl = document.getElementById('spotifyActivity');
            spotifyEl.classList.remove('hidden');
            document.getElementById('spotifySong').textContent = spotify.song;
            document.getElementById('spotifyArtist').textContent = spotify.artist;
            document.getElementById('spotifyAlbum').textContent = spotify.album;
            document.getElementById('spotifyTimeEnd').textContent = formatTime(spotify.timestamps.end - spotify.timestamps.start);
            updateSpotifyProgress(spotify.timestamps.start, spotify.timestamps.end);
        }

        // Other Activities
        const otherActivities = activities.filter(a => a.type !== 4 && a.type !== 2);
        const otherActivitiesEl = document.getElementById('otherActivities');
        otherActivitiesEl.innerHTML = '';
        
        otherActivities.forEach(activity => {
            const activityEl = document.createElement('div');
            activityEl.className = 'activity-card rounded-xl p-4';
            
            let iconHtml = '';
            let titleText = activity.name;
            let typeText = '';
            
            switch(activity.type) {
                case 0: typeText = 'Playing'; iconHtml = '<i class="fas fa-gamepad"></i>'; break;
                case 1: typeText = 'Streaming'; iconHtml = '<i class="fas fa-video"></i>'; break;
                case 3: typeText = 'Watching'; iconHtml = '<i class="fas fa-eye"></i>'; break;
                case 5: typeText = 'Competing in'; iconHtml = '<i class="fas fa-trophy"></i>'; break;
            }
            
            let detailsHtml = '';
            if (activity.details) detailsHtml += `<p class="text-white font-semibold text-sm truncate">${activity.details}</p>`;
            if (activity.state) detailsHtml += `<p class="text-gray-400 text-xs truncate">${activity.state}</p>`;
            
            activityEl.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-purple-500/20 rounded-lg flex items-center justify-center text-purple-400">
                            ${iconHtml}
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs text-gray-400 font-semibold uppercase tracking-wider mb-1">${typeText} ${titleText}</p>
                        ${detailsHtml}
                    </div>
                </div>
            `;
            otherActivitiesEl.appendChild(activityEl);
        });

        // Hide loader and show content
        setTimeout(() => {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('content').classList.add('loaded');
        }, 500);
    }

    function hideLoader() {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('content').classList.add('loaded');
    }

    // Fetch data on load using REST API
    async function fetchData() {
        try {
            const response = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
            const result = await response.json();
            
            if (result.success && result.data) {
                renderUserData(result.data);
            } else {
                console.error('Failed to fetch user data');
                hideLoader();
            }
        } catch (error) {
            console.error('Error fetching Lanyard data:', error);
            hideLoader();
        }
    }

    // Initialize
    fetchData();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
