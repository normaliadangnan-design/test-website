<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Profile Card</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    
    * {
        font-family: 'Inter', sans-serif;
    }
    
    body {
        background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
    }
    
    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    
    .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .status-online { background: #23a55a; }
    .status-idle { background: #f0b232; }
    .status-dnd { background: #f23f43; }
    .status-offline { background: #80848e; }
    
    .avatar-wrapper {
        position: relative;
        width: 128px;
        height: 128px;
    }
    
    .avatar-img {
        width: 128px;
        height: 128px;
        border-radius: 50%;
        object-fit: cover;
    }
    
    .avatar-deco {
        position: absolute;
        width: 150px;
        height: 150px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 10;
    }
    
    .status-indicator {
        position: absolute;
        bottom: 4px;
        right: 4px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 6px solid #1a1b1e;
        z-index: 20;
    }
    
    .activity-card {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s ease;
    }
    
    .activity-card:hover {
        background: rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-2px);
    }
    
    .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.1);
        transition: all 0.2s ease;
    }
    
    .badge:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
    }
    
    .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    .loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
    }
    
    .loader {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top: 4px solid #5865f2;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    .pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        align-items: center;
        justify-content: center;
        padding: 16px;
    }
    
    .modal.active {
        display: flex;
    }
    
    .modal-content {
        animation: modalSlideIn 0.3s ease;
        max-width: 100%;
    }
    
    @keyframes modalSlideIn {
        from {
            opacity: 0;
            transform: scale(0.9) translateY(-20px);
        }
        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }
    
    .progress-bar {
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 8px;
    }
    
    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #5865f2 0%, #7289da 100%);
        border-radius: 2px;
        transition: width 0.3s ease;
    }
    
    @media (max-width: 390px) {
        .avatar-wrapper {
            width: 112px;
            height: 112px;
        }
        .avatar-img {
            width: 112px;
            height: 112px;
        }
        .avatar-deco {
            width: 134px;
            height: 134px;
        }
    }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-6">
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-white text-lg font-semibold">Loading Profile...</p>
            <p class="text-gray-400 text-sm mt-2">Fetching data from Lanyard API</p>
        </div>
    </div>

    <!-- Main Card -->
    <div id="profileCard" class="glass rounded-3xl shadow-2xl w-full max-w-md overflow-hidden opacity-0 transition-opacity duration-500">
        <!-- Banner -->
        <div class="relative h-48 bg-gradient-to-br from-purple-600 via-blue-500 to-pink-500">
            <img id="bannerImg" src="./azura.webp" alt="Banner" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-[#1a1b1e] to-transparent"></div>
        </div>
        
        <!-- Profile Content -->
        <div class="relative px-6 pb-6">
            <!-- Avatar -->
            <div class="flex justify-between items-end -mt-16 mb-4">
                <div class="avatar-wrapper cursor-pointer" onclick="openModal()">
                    <img id="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar" class="avatar-img border-8 border-[#1a1b1e]">
                    <img id="avatarDeco" src="" alt="Decoration" class="avatar-deco hidden">
                    <div id="statusIndicator" class="status-indicator status-offline"></div>
                </div>
                <button id="messageBtn" class="bg-[#5865f2] hover:bg-[#4752c4] text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition-all duration-200 shadow-lg hover:shadow-xl hover:scale-105 active:scale-95">
                    Message
                </button>
            </div>
            
            <!-- User Info -->
            <div class="mb-5">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                    <h1 id="displayName" class="text-white text-2xl font-bold">Loading...</h1>
                    <div id="badges" class="flex gap-1"></div>
                </div>
                <p id="username" class="text-gray-400 text-sm mb-3">@username</p>
                <p id="customStatus" class="text-gray-300 text-sm flex items-center gap-2 hidden">
                    <span id="statusEmoji"></span>
                    <span id="statusText"></span>
                </p>
            </div>
            
            <!-- About Me -->
            <div class="mb-5">
                <h3 class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">About Me</h3>
                <p id="bio" class="text-gray-300 text-sm leading-relaxed">No bio available</p>
            </div>
            
            <!-- Activities -->
            <div id="activitiesSection" class="hidden">
                <h3 class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-3">Activity</h3>
                <div id="activities" class="space-y-3"></div>
            </div>
            
            <!-- Spotify -->
            <div id="spotifySection" class="hidden mt-5">
                <h3 class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-3">
                    <i class="fab fa-spotify text-green-500 mr-1"></i> Listening to Spotify
                </h3>
                <div class="activity-card rounded-xl p-4">
                    <div class="flex gap-3">
                        <img id="spotifyAlbum" src="" alt="Album" class="w-20 h-20 rounded-lg object-cover">
                        <div class="flex-1 min-w-0">
                            <p id="spotifyTrack" class="text-white font-semibold text-sm truncate">Track Name</p>
                            <p id="spotifyArtist" class="text-gray-400 text-xs truncate mt-1">Artist Name</p>
                            <p id="spotifyAlbumName" class="text-gray-500 text-xs truncate">Album Name</p>
                            <div class="progress-bar">
                                <div id="spotifyProgress" class="progress-fill" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Avatar Modal -->
    <div id="avatarModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content glass rounded-3xl p-6 max-w-sm w-full" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-4">
                <h2 class="text-white text-xl font-bold">Avatar</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="flex justify-center mb-4">
                <div class="avatar-wrapper">
                    <img id="modalAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar" class="avatar-img">
                    <img id="modalAvatarDeco" src="" alt="Decoration" class="avatar-deco hidden">
                </div>
            </div>
            <div class="text-center">
                <p id="modalUsername" class="text-white font-semibold text-lg"></p>
                <p class="text-gray-400 text-sm mt-1">Click outside to close</p>
            </div>
        </div>
    </div>

<script>
    // CONFIGURE YOUR DISCORD USER ID HERE
    const DISCORD_ID = '852760926843963422'; // Replace with actual Discord ID
    const LANYARD_API = `https://api.lanyard.rest/v1/users/${DISCORD_ID}`;
    
    let updateInterval;
    
    // Fetch data from Lanyard REST API
    async function fetchLanyardData() {
        try {
            const response = await fetch(LANYARD_API);
            const data = await response.json();
            
            if (data.success) {
                updateProfile(data.data);
                hideLoading();
            } else {
                showError();
            }
        } catch (error) {
            console.error('Error fetching Lanyard data:', error);
            showError();
        }
    }
    
    function updateProfile(user) {
        // Avatar and decoration
        const avatarUrl = user.discord_user.avatar 
            ? `https://cdn.discordapp.com/avatars/${user.discord_user.id}/${user.discord_user.avatar}.${user.discord_user.avatar.startsWith('a_') ? 'gif' : 'png'}?size=512`
            : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discord_user.discriminator) % 5}.png`;
        
        document.getElementById('avatar').src = avatarUrl;
        document.getElementById('modalAvatar').src = avatarUrl;
        
        if (user.discord_user.avatar_decoration_data) {
            const decoUrl = `https://cdn.discordapp.com/avatar-decoration-presets/${user.discord_user.avatar_decoration_data.asset}.png?size=512`;
            document.getElementById('avatarDeco').src = decoUrl;
            document.getElementById('avatarDeco').classList.remove('hidden');
            document.getElementById('modalAvatarDeco').src = decoUrl;
            document.getElementById('modalAvatarDeco').classList.remove('hidden');
        }
        
        // User info
        document.getElementById('displayName').textContent = user.discord_user.global_name || user.discord_user.username;
        document.getElementById('username').textContent = `@${user.discord_user.username}`;
        document.getElementById('modalUsername').textContent = user.discord_user.global_name || user.discord_user.username;
        
        // Status
        const statusIndicator = document.getElementById('statusIndicator');
        statusIndicator.className = `status-indicator status-${user.discord_status}`;
        
        // Custom status
        if (user.activities && user.activities.length > 0) {
            const customStatus = user.activities.find(a => a.type === 4);
            if (customStatus) {
                document.getElementById('customStatus').classList.remove('hidden');
                document.getElementById('statusEmoji').textContent = customStatus.emoji ? customStatus.emoji.name : '';
                document.getElementById('statusText').textContent = customStatus.state || '';
            } else {
                document.getElementById('customStatus').classList.add('hidden');
            }
        }
        
        // Badges - Public flags
        const badges = document.getElementById('badges');
        badges.innerHTML = '';
        if (user.discord_user.public_flags) {
            const flags = user.discord_user.public_flags;
            const badgeMap = {
                1: { icon: 'fa-medal', title: 'Staff', color: 'text-[#f4c034]' },
                2: { icon: 'fa-handshake', title: 'Partner', color: 'text-[#5865f2]' },
                4: { icon: 'fa-bolt', title: 'HypeSquad', color: 'text-[#f4c034]' },
                8: { icon: 'fa-bug', title: 'Bug Hunter', color: 'text-[#41cf71]' },
                64: { icon: 'fa-house', title: 'HypeSquad Bravery', color: 'text-[#9c84ef]' },
                128: { icon: 'fa-gem', title: 'HypeSquad Brilliance', color: 'text-[#f47b67]' },
                256: { icon: 'fa-coins', title: 'HypeSquad Balance', color: 'text-[#45ddc0]' },
                512: { icon: 'fa-star', title: 'Early Supporter', color: 'text-[#9c84ef]' }
            };
            
            Object.keys(badgeMap).forEach(flag => {
                if (flags & flag) {
                    const badge = badgeMap[flag];
                    badges.innerHTML += `
                        <div class="badge" title="${badge.title}">
                            <i class="fas ${badge.icon} ${badge.color} text-xs"></i>
                        </div>
                    `;
                }
            });
        }
        
        // Premium/Display name decoration
        if (user.discord_user.premium_type) {
            const nitroBadge = user.discord_user.premium_type === 2 
                ? { icon: 'fa-rocket', title: 'Nitro', color: 'text-[#ff73fa]' }
                : { icon: 'fa-star', title: 'Nitro Classic', color: 'text-[#7289da]' };
            badges.innerHTML += `
                <div class="badge" title="${nitroBadge.title}">
                    <i class="fas ${nitroBadge.icon} ${nitroBadge.color} text-xs"></i>
                </div>
            `;
        }
        
        // Activities
        updateActivities(user.activities);
        
        // Spotify
        if (user.listening_to_spotify && user.spotify) {
            updateSpotify(user.spotify);
        } else {
            document.getElementById('spotifySection').classList.add('hidden');
        }
    }
    
    function updateActivities(activities) {
        const activitiesDiv = document.getElementById('activities');
        const section = document.getElementById('activitiesSection');
        
        if (!activities || activities.length === 0) {
            section.classList.add('hidden');
            return;
        }
        
        // Filter out custom status and Spotify
        const gameActivities = activities.filter(a => a.type !== 4 && a.id !== 'spotify:1');
        
        if (gameActivities.length === 0) {
            section.classList.add('hidden');
            return;
        }
        
        section.classList.remove('hidden');
        activitiesDiv.innerHTML = '';
        
        gameActivities.forEach(activity => {
            let icon = 'fa-gamepad';
            let color = 'text-purple-400';
            let label = 'Playing';
            
            if (activity.type === 1) { icon = 'fa-video'; color = 'text-red-400'; label = 'Streaming'; }
            else if (activity.type === 2) { icon = 'fa-headphones'; color = 'text-green-400'; label = 'Listening to'; }
            else if (activity.type === 3) { icon = 'fa-eye'; color = 'text-blue-400'; label = 'Watching'; }
            
            const largeImage = activity.assets?.large_image 
                ? `https://cdn.discordapp.com/app-assets/${activity.application_id}/${activity.assets.large_image}.png`
                : null;
            
            activitiesDiv.innerHTML += `
                <div class="activity-card rounded-xl p-4">
                    <div class="flex gap-3">
                        ${largeImage ? `<img src="${largeImage}" alt="${activity.name}" class="w-16 h-16 rounded-lg object-cover">` : `<div class="w-16 h-16 rounded-lg bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center"><i class="fas ${icon} text-2xl text-white"></i></div>`}
                        <div class="flex-1 min-w-0">
                            <p class="text-gray-400 text-xs font-semibold uppercase mb-1">
                                <i class="fas ${icon} ${color} mr-1"></i>${label}
                            </p>
                            <p class="text-white font-semibold text-sm truncate">${activity.name}</p>
                            ${activity.details ? `<p class="text-gray-400 text-xs truncate mt-1">${activity.details}</p>` : ''}
                            ${activity.state ? `<p class="text-gray-500 text-xs truncate">${activity.state}</p>` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
    }
    
    function updateSpotify(spotify) {
        const section = document.getElementById('spotifySection');
        section.classList.remove('hidden');
        
        document.getElementById('spotifyAlbum').src = spotify.album_art_url;
        document.getElementById('spotifyTrack').textContent = spotify.song;
        document.getElementById('spotifyArtist').textContent = spotify.artist;
        document.getElementById('spotifyAlbumName').textContent = spotify.album;
        
        // Progress bar
        const start = spotify.timestamps.start;
        const end = spotify.timestamps.end;
        const now = Date.now();
        const progress = ((now - start) / (end - start)) * 100;
        document.getElementById('spotifyProgress').style.width = `${Math.min(Math.max(progress, 0), 100)}%`;
    }
    
    function hideLoading() {
        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('profileCard').style.opacity = '1';
    }
    
    function showError() {
        document.getElementById('loadingScreen').innerHTML = `
            <div class="text-center">
                <i class="fas fa-exclamation-circle text-red-500 text-5xl mb-4"></i>
                <p class="text-white text-lg font-semibold">Failed to Load Profile</p>
                <p class="text-gray-400 text-sm mt-2">Please check the Discord ID and try again</p>
                <button onclick="location.reload()" class="mt-4 bg-[#5865f2] hover:bg-[#4752c4] text-white px-6 py-2 rounded-lg font-semibold text-sm transition-all">Retry</button>
            </div>
        `;
    }
    
    function openModal() {
        document.getElementById('avatarModal').classList.add('active');
    }
    
    function closeModal(event) {
        if (!event || event.target.id === 'avatarModal') {
            document.getElementById('avatarModal').classList.remove('active');
        }
    }
    
    document.getElementById('messageBtn').addEventListener('click', () => {
        window.open(`https://discord.com/users/${DISCORD_ID}`, '_blank');
    });
    
    // Initial fetch
    fetchLanyardData();
    
    // Update every 10 seconds using REST API only
    updateInterval = setInterval(fetchLanyardData, 10000);
    
    // ESC to close modal
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });
</script>

</body>
</html>
