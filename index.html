<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Profile Card</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    
    * {
        font-family: 'Poppins', sans-serif;
    }
    
    body {
        background: #0f0f14;
        overflow-x: hidden;
    }
    
    .bg-grid {
        background-image: 
            linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
        background-size: 50px 50px;
    }
    
    .glass {
        background: rgba(24, 25, 34, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.06);
    }
    
    .banner-gradient {
        background: linear-gradient(180deg, transparent 0%, rgba(24, 25, 34, 1) 100%);
    }
    
    .status-online { background: #23a55a; }
    .status-idle { background: #f0b232; }
    .status-dnd { background: #f23f43; }
    .status-offline { background: #80848e; }
    
    .avatar-wrapper {
        position: relative;
        width: 128px;
        height: 128px;
    }
    
    .avatar-deco {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 150px;
        height: 150px;
        pointer-events: none;
        z-index: 10;
    }
    
    .avatar-img {
        width: 128px;
        height: 128px;
        border-radius: 50%;
        object-fit: cover;
        border: 6px solid #181922;
        cursor: pointer;
        transition: transform 0.3s ease;
    }
    
    .avatar-img:hover {
        transform: scale(1.05);
    }
    
    .status-indicator {
        position: absolute;
        bottom: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 6px solid #181922;
        z-index: 11;
    }
    
    .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0f0f14;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    .loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
    }
    
    .loader {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(88, 101, 242, 0.2);
        border-top-color: #5865F2;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    .fade-in {
        animation: fadeIn 0.6s ease-out;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .progress-bar {
        background: linear-gradient(90deg, #1DB954 0%, #1ed760 100%);
        transition: width 0.3s ease;
    }
    
    .activity-card, .spotify-card {
        transition: all 0.3s ease;
    }
    
    .activity-card:hover, .spotify-card:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.05);
    }
    
    .social-icon {
        transition: all 0.3s ease;
    }
    
    .social-icon:hover {
        transform: translateY(-3px) scale(1.1);
    }
    
    .badge {
        transition: transform 0.2s ease;
    }
    
    .badge:hover {
        transform: scale(1.15);
    }
    
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        z-index: 9998;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        padding: 1rem;
    }
    
    .modal-overlay.active {
        opacity: 1;
        visibility: visible;
    }
    
    .modal-content {
        transform: scale(0.9);
        transition: transform 0.3s ease;
    }
    
    .modal-overlay.active .modal-content {
        transform: scale(1);
    }
    
    @media (max-width: 450px) {
        .avatar-wrapper {
            width: 112px;
            height: 112px;
        }
        .avatar-img {
            width: 112px;
            height: 112px;
        }
        .avatar-deco {
            width: 132px;
            height: 132px;
        }
        .status-indicator {
            width: 24px;
            height: 24px;
            border-width: 5px;
        }
    }
</style>
</head>
<body class="bg-grid min-h-screen flex items-center justify-center p-4 md:p-6">
<!-- Loading Screen -->
<div id="loadingScreen" class="loading-screen">
    <div class="text-center">
        <div class="loader mx-auto mb-4"></div>
        <p class="text-gray-400 text-sm">Loading profile...</p>
    </div>
</div>

<!-- Avatar Profile Modal -->
<div id="profileModal" class="modal-overlay">
    <div class="modal-content glass rounded-2xl max-w-md w-full overflow-hidden shadow-2xl">
        <div class="relative">
           <img id="modalBanner" src="./azura.webp" alt="Banner" class="w-full h-32 object-cover">
            <button id="closeModal" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/50 hover:bg-black/70 flex items-center justify-center text-white transition-all">
                <i class="fas fa-times text-sm"></i>
            </button>
        </div>
        <div class="p-6 pt-0">
            <div class="flex items-end -mt-12 mb-4">
                <div class="relative">
                    <img id="modalAvatar" src="" alt="Avatar" class="w-24 h-24 rounded-full border-4 border-[#181922]">
                    <div id="modalStatus" class="absolute bottom-1 right-1 w-7 h-7 rounded-full border-4 border-[#181922] status-offline"></div>
                </div>
            </div>
            
            <div class="space-y-4">
                <div>
                    <h3 id="modalUsername" class="text-2xl font-bold text-white mb-1">Loading...</h3>
                    <p id="modalUserTag" class="text-gray-400 text-sm">@username</p>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/5 rounded-lg p-3">
                        <p class="text-gray-400 text-xs mb-1">User ID</p>
                        <p id="modalUserId" class="text-white text-sm font-mono break-all">-</p>
                    </div>
                    <div class="bg-white/5 rounded-lg p-3">
                        <p class="text-gray-400 text-xs mb-1">Status</p>
                        <p id="modalStatusText" class="text-white text-sm font-medium">Offline</p>
                    </div>
                </div>
                
                <div id="modalBadgesContainer" class="bg-white/5 rounded-lg p-3 hidden">
                    <p class="text-gray-400 text-xs mb-2">Badges</p>
                    <div id="modalBadges" class="flex flex-wrap gap-2"></div>
                </div>
                
                <div id="modalCustomStatus" class="bg-white/5 rounded-lg p-3 hidden">
                    <p class="text-gray-400 text-xs mb-1">Custom Status</p>
                    <p id="modalCustomStatusText" class="text-white text-sm">-</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Main Profile Card -->
<div id="profileCard" class="w-full max-w-xl opacity-0">
    <div class="glass rounded-2xl overflow-hidden shadow-2xl">
        <!-- Banner -->
        <div class="relative h-48 md:h-56">
            <img id="banner" src="./azura.webp" alt="Banner" class="w-full h-full object-cover">
            <div class="absolute inset-0 banner-gradient"></div>
        </div>
        
        <!-- Profile Section -->
        <div class="px-6 md:px-8 pb-6 md:pb-8">
            <!-- Avatar -->
            <div class="flex items-end justify-between -mt-16 mb-4">
                <div class="avatar-wrapper">
                    <img id="avatar" src="" alt="Avatar" class="avatar-img">
                    <img id="avatarDecoration" src="" alt="Avatar Decoration" class="avatar-deco hidden">
                    <div id="statusIndicator" class="status-indicator status-offline"></div>
                </div>
                
                <!-- Badges -->
                <div id="badges" class="flex gap-1.5 pb-2"></div>
            </div>
            
            <!-- User Info -->
            <div class="mb-6">
                <div class="flex items-center gap-2 mb-1">
                    <h1 id="username" class="text-2xl md:text-3xl font-bold text-white">Loading...</h1>
                    <i id="ownerCrown" class="fas fa-crown text-yellow-400 text-lg hidden" title="Server Owner"></i>
                </div>
                <p id="userTag" class="text-gray-400 text-sm mb-3">@username</p>
                <p id="customStatus" class="text-gray-300 text-sm hidden"></p>
            </div>
            
            <!-- Activities Container -->
            <div id="activitiesContainer" class="space-y-3 mb-6"></div>
            
            <!-- Spotify -->
            <div id="spotifyCard" class="spotify-card bg-white/5 rounded-xl p-4 mb-6 hidden">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <i class="fab fa-spotify text-[#1DB954] text-xl"></i>
                        <span class="text-white text-sm font-semibold">Listening to Spotify</span>
                    </div>
                    <i class="fas fa-music text-gray-500 text-xs"></i>
                </div>
                <div class="flex items-center gap-3">
                    <img id="spotifyAlbum" src="" alt="Album" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-1 min-w-0">
                        <p id="spotifySong" class="text-white font-semibold text-sm truncate">-</p>
                        <p id="spotifyArtist" class="text-gray-400 text-xs truncate">-</p>
                        <p id="spotifyAlbumName" class="text-gray-500 text-xs truncate">-</p>
                    </div>
                </div>
                <div class="mt-3">
                    <div class="flex items-center justify-between text-xs text-gray-400 mb-1">
                        <span id="spotifyProgress">0:00</span>
                        <span id="spotifyDuration">0:00</span>
                    </div>
                    <div class="w-full bg-white/5 rounded-full h-1.5 overflow-hidden">
                        <div id="spotifyProgressBar" class="progress-bar h-full rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <!-- Social Links -->
            <div class="flex items-center justify-center gap-4">
                <a href="https://discord.com/users/1250654354344775703" target="_blank" class="social-icon w-11 h-11 rounded-xl bg-[#5865F2]/10 hover:bg-[#5865F2]/20 flex items-center justify-center group">
                    <i class="fab fa-discord text-[#5865F2] text-lg group-hover:scale-110 transition-transform"></i>
                </a>
                <a href="#" target="_blank" class="social-icon w-11 h-11 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center group">
                    <i class="fab fa-twitter text-white text-lg group-hover:scale-110 transition-transform"></i>
                </a>
                <a href="#" target="_blank" class="social-icon w-11 h-11 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center group">
                    <i class="fab fa-github text-white text-lg group-hover:scale-110 transition-transform"></i>
                </a>
                <a href="#" target="_blank" class="social-icon w-11 h-11 rounded-xl bg-gradient-to-br from-purple-500/10 to-pink-500/10 hover:from-purple-500/20 hover:to-pink-500/20 flex items-center justify-center group">
                    <i class="fab fa-instagram text-white text-lg group-hover:scale-110 transition-transform"></i>
                </a>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <p class="text-center text-gray-500 text-xs mt-4">Powered by @LeonXyz</p>
</div>

<script>
    const USER_ID = '1250654354344775703';
    const LANYARD_API = `https://api.lanyard.rest/v1/users/${USER_ID}`;
    
    // Badge definitions
    const BADGES = {
        STAFF: { icon: 'fa-shield-halved', color: '#5865F2', title: 'Discord Staff' },
        PARTNER: { icon: 'fa-handshake', color: '#5865F2', title: 'Partnered Server Owner' },
        HYPESQUAD_EVENTS: { icon: 'fa-star', color: '#F47B67', title: 'HypeSquad Events' },
        BUG_HUNTER_LEVEL_1: { icon: 'fa-bug', color: '#57F287', title: 'Bug Hunter Level 1' },
        HOUSE_BRAVERY: { icon: 'fa-shield', color: '#9C84EF', title: 'House of Bravery' },
        HOUSE_BRILLIANCE: { icon: 'fa-gem', color: '#F47B67', title: 'House of Brilliance' },
        HOUSE_BALANCE: { icon: 'fa-scale-balanced', color: '#57F287', title: 'House of Balance' },
        EARLY_SUPPORTER: { icon: 'fa-heart', color: '#F47B67', title: 'Early Supporter' },
        BUG_HUNTER_LEVEL_2: { icon: 'fa-bug', color: '#FEE75C', title: 'Bug Hunter Level 2' },
        VERIFIED_BOT: { icon: 'fa-robot', color: '#57F287', title: 'Verified Bot' },
        VERIFIED_DEVELOPER: { icon: 'fa-code', color: '#57F287', title: 'Early Verified Bot Developer' },
        CERTIFIED_MODERATOR: { icon: 'fa-graduation-cap', color: '#57F287', title: 'Moderator Programs Alumni' },
        BOT_HTTP_INTERACTIONS: { icon: 'fa-slash', color: '#57F287', title: 'HTTP Interactions Bot' },
        ACTIVE_DEVELOPER: { icon: 'fa-flask', color: '#57F287', title: 'Active Developer' },
        NITRO: { icon: 'fa-bolt', color: '#B588FF', title: 'Nitro Subscriber' },
        BOOSTER: { icon: 'fa-rocket', color: '#FF73FA', title: 'Server Booster' }
    };
    
    let currentData = null;
    let spotifyInterval = null;
    
    // Format time
    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }
    
    // Get avatar URL
    function getAvatarUrl(user) {
        if (user.avatar) {
            const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
            return `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=256`;
        }
        return `https://cdn.discordapp.com/embed/avatars/${(parseInt(user.discriminator) || 0) % 5}.png`;
    }
    
    // Update status
    function updateStatus(status) {
        const indicator = document.getElementById('statusIndicator');
        const modalStatus = document.getElementById('modalStatus');
        const statusText = document.getElementById('modalStatusText');
        
        indicator.className = 'status-indicator';
        modalStatus.className = 'absolute bottom-1 right-1 w-7 h-7 rounded-full border-4 border-[#181922]';
        
        let statusClass = 'status-offline';
        let statusName = 'Offline';
        
        if (status === 'online') {
            statusClass = 'status-online';
            statusName = 'Online';
        } else if (status === 'idle') {
            statusClass = 'status-idle';
            statusName = 'Idle';
        } else if (status === 'dnd') {
            statusClass = 'status-dnd';
            statusName = 'Do Not Disturb';
        }
        
        indicator.classList.add(statusClass);
        modalStatus.classList.add(statusClass);
        statusText.textContent = statusName;
    }
    
    // Update badges
    function updateBadges(flags) {
        const badgesContainer = document.getElementById('badges');
        const modalBadgesContainer = document.getElementById('modalBadgesContainer');
        const modalBadges = document.getElementById('modalBadges');
        
        badgesContainer.innerHTML = '';
        modalBadges.innerHTML = '';
        
        let hasBadges = false;
        
        // Public flags mapping
        const flagMap = {
            1: 'STAFF',
            2: 'PARTNER',
            4: 'HYPESQUAD_EVENTS',
            8: 'BUG_HUNTER_LEVEL_1',
            64: 'HOUSE_BRAVERY',
            128: 'HOUSE_BRILLIANCE',
            256: 'HOUSE_BALANCE',
            512: 'EARLY_SUPPORTER',
            16384: 'BUG_HUNTER_LEVEL_2',
            65536: 'VERIFIED_BOT',
            131072: 'VERIFIED_DEVELOPER',
            262144: 'CERTIFIED_MODERATOR',
            524288: 'BOT_HTTP_INTERACTIONS',
            4194304: 'ACTIVE_DEVELOPER'
        };
        
        for (const [flag, badge] of Object.entries(flagMap)) {
            if (flags & flag && BADGES[badge]) {
                hasBadges = true;
                const badgeEl = document.createElement('div');
                badgeEl.className = 'badge w-8 h-8 rounded-lg flex items-center justify-center cursor-help';
                badgeEl.style.backgroundColor = BADGES[badge].color + '20';
                badgeEl.title = BADGES[badge].title;
                badgeEl.innerHTML = `<i class="fas ${BADGES[badge].icon}" style="color: ${BADGES[badge].color}; font-size: 14px;"></i>`;
                badgesContainer.appendChild(badgeEl);
                
                const modalBadgeEl = badgeEl.cloneNode(true);
                modalBadges.appendChild(modalBadgeEl);
            }
        }
        
        if (hasBadges) {
            modalBadgesContainer.classList.remove('hidden');
        }
    }
    
    // Update Spotify
    function updateSpotify(spotify) {
        const card = document.getElementById('spotifyCard');
        
        if (!spotify) {
            card.classList.add('hidden');
            if (spotifyInterval) {
                clearInterval(spotifyInterval);
                spotifyInterval = null;
            }
            return;
        }
        
        card.classList.remove('hidden');
        document.getElementById('spotifyAlbum').src = spotify.album_art_url;
        document.getElementById('spotifySong').textContent = spotify.song;
        document.getElementById('spotifyArtist').textContent = spotify.artist;
        document.getElementById('spotifyAlbumName').textContent = spotify.album;
        
        const updateProgress = () => {
            const now = Date.now();
            const elapsed = now - spotify.timestamps.start;
            const duration = spotify.timestamps.end - spotify.timestamps.start;
            const progress = Math.min((elapsed / duration) * 100, 100);
            
            document.getElementById('spotifyProgressBar').style.width = progress + '%';
            document.getElementById('spotifyProgress').textContent = formatTime(elapsed);
            document.getElementById('spotifyDuration').textContent = formatTime(duration);
        };
        
        updateProgress();
        if (spotifyInterval) clearInterval(spotifyInterval);
        spotifyInterval = setInterval(updateProgress, 1000);
    }
    
    // Update activities
    function updateActivities(activities) {
        const container = document.getElementById('activitiesContainer');
        container.innerHTML = '';
        
        const nonSpotifyActivities = activities.filter(a => a.type !== 2);
        
        nonSpotifyActivities.forEach(activity => {
            const card = document.createElement('div');
            card.className = 'activity-card bg-white/5 rounded-xl p-4';
            
            let icon = 'fa-gamepad';
            let typeText = 'Playing';
            
            if (activity.type === 0) {
                icon = 'fa-gamepad';
                typeText = 'Playing';
            } else if (activity.type === 1) {
                icon = 'fa-video';
                typeText = 'Streaming';
            } else if (activity.type === 3) {
                icon = 'fa-tv';
                typeText = 'Watching';
            } else if (activity.type === 4) {
                icon = 'fa-comment';
                typeText = '';
            } else if (activity.type === 5) {
                icon = 'fa-trophy';
                typeText = 'Competing in';
            }
            
            let details = '';
            if (activity.type === 4 && activity.state) {
                document.getElementById('customStatus').textContent = activity.state;
                document.getElementById('customStatus').classList.remove('hidden');
                document.getElementById('modalCustomStatus').classList.remove('hidden');
                document.getElementById('modalCustomStatusText').textContent = activity.state;
                return;
            } else {
                document.getElementById('customStatus').classList.add('hidden');
                document.getElementById('modalCustomStatus').classList.add('hidden');
            }
            
            card.innerHTML = `
                <div class="flex items-center gap-2 mb-2">
                    <i class="fas ${icon} text-gray-400 text-sm"></i>
                    <span class="text-gray-400 text-xs font-medium uppercase">${typeText}</span>
                </div>
                <div class="flex items-center gap-3">
                    ${activity.assets?.large_image ? `
                        <img src="https://cdn.discordapp.com/app-assets/${activity.application_id}/${activity.assets.large_image}.png" 
                             alt="${activity.name}" 
                             class="w-14 h-14 rounded-lg object-cover">
                    ` : ''}
                    <div class="flex-1 min-w-0">
                        <p class="text-white font-semibold text-sm truncate">${activity.name}</p>
                        ${activity.details ? `<p class="text-gray-400 text-xs truncate">${activity.details}</p>` : ''}
                        ${activity.state ? `<p class="text-gray-500 text-xs truncate">${activity.state}</p>` : ''}
                    </div>
                </div>
            `;
            
            container.appendChild(card);
        });
    }
    
    // Update profile
    function updateProfile(data) {
        currentData = data;
        const user = data.discord_user;
        
        // Avatar
        const avatarUrl = getAvatarUrl(user);
        document.getElementById('avatar').src = avatarUrl;
        document.getElementById('modalAvatar').src = avatarUrl;
        
        // Avatar decoration
        if (user.avatar_decoration_data) {
            const decoUrl = `https://cdn.discordapp.com/avatar-decoration-presets/${user.avatar_decoration_data.asset}.png?size=160`;
            document.getElementById('avatarDecoration').src = decoUrl;
            document.getElementById('avatarDecoration').classList.remove('hidden');
        }
        
        // Username
        const displayName = user.global_name || user.username;
        document.getElementById('username').textContent = displayName;
        document.getElementById('modalUsername').textContent = displayName;
        document.getElementById('userTag').textContent = `@${user.username}`;
        document.getElementById('modalUserTag').textContent = `@${user.username}`;
        document.getElementById('modalUserId').textContent = user.id;
        
        // Status
        updateStatus(data.discord_status);
        
        // Badges
        updateBadges(user.public_flags || 0);
        
        // Activities
        updateActivities(data.activities || []);
        
        // Spotify
        updateSpotify(data.spotify);
        
        // Hide loading screen
        setTimeout(() => {
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('profileCard').classList.add('fade-in');
            document.getElementById('profileCard').style.opacity = '1';
        }, 500);
    }
    
    // Fetch data from Lanyard
    async function fetchLanyard() {
        try {
            const response = await fetch(LANYARD_API);
            const { data } = await response.json();
            updateProfile(data);
        } catch (error) {
            console.error('Failed to fetch Lanyard data:', error);
            document.getElementById('username').textContent = 'Failed to load';
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('profileCard').style.opacity = '1';
        }
    }
    
    // Modal handlers
    document.getElementById('avatar').addEventListener('click', () => {
        document.getElementById('profileModal').classList.add('active');
    });
    
    document.getElementById('closeModal').addEventListener('click', () => {
        document.getElementById('profileModal').classList.remove('active');
    });
    
    document.getElementById('profileModal').addEventListener('click', (e) => {
        if (e.target.id === 'profileModal') {
            document.getElementById('profileModal').classList.remove('active');
        }
    });
    
    // WebSocket for real-time updates
    function connectWebSocket() {
        const ws = new WebSocket('wss://api.lanyard.rest/socket');
        
        ws.onopen = () => {
            ws.send(JSON.stringify({
                op: 2,
                d: { subscribe_to_id: USER_ID }
            }));
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.t === 'INIT_STATE' || data.t === 'PRESENCE_UPDATE') {
                updateProfile(data.d);
            }
        };
        
        ws.onerror = () => {
            console.error('WebSocket error, falling back to HTTP');
            fetchLanyard();
        };
        
        ws.onclose = () => {
            setTimeout(connectWebSocket, 5000);
        };
    }
    
    // Initialize
    fetchLanyard();
    connectWebSocket();
    
    // Refresh every 30s as fallback
    setInterval(fetchLanyard, 30000);
</script>
