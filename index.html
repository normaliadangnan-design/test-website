<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Profile Card - Lanyard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    
    * {
        font-family: 'Poppins', sans-serif;
    }
    
    body {
        background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f23 100%);
        min-height: 100vh;
        overflow-x: hidden;
    }
    
    .bg-anime {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.15;
        background-image: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=2070');
        background-size: cover;
        background-position: center;
        filter: blur(3px) brightness(0.4);
    }
    
    .bg-anime::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(10,10,15,0.8) 100%);
    }
    
    .card-glow {
        box-shadow: 0 0 60px rgba(88, 101, 242, 0.15), 
                    0 0 100px rgba(88, 101, 242, 0.1),
                    0 20px 60px rgba(0, 0, 0, 0.8);
    }
    
    .avatar-glow {
        box-shadow: 0 0 0 4px #0d0d11,
                    0 0 20px rgba(67, 181, 129, 0.5);
    }
    
    .cat-ear {
        position: absolute;
        width: 36px;
        height: 36px;
        background: #1e1e28;
        border: 3px solid #0d0d11;
        border-bottom: none;
        border-right: none;
        border-radius: 10px 100% 0 100%;
        z-index: 1;
    }
    
    .cat-ear.left {
        top: -18px;
        left: 8px;
        transform: rotate(-45deg);
    }
    
    .cat-ear.right {
        top: -18px;
        right: 8px;
        transform: rotate(45deg) scaleX(-1);
    }
    
    .cat-ear-inner {
        position: absolute;
        width: 20px;
        height: 20px;
        background: linear-gradient(135deg, #ff6b9d, #c44569);
        border-radius: 6px 100% 0 100%;
        top: 5px;
        left: 5px;
        opacity: 0.6;
    }
    
    .status-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 4px solid #0d0d11;
        position: absolute;
        bottom: 2px;
        right: 2px;
    }
    
    .status-online { background: #43b581; }
    .status-idle { background: #faa61a; }
    .status-dnd { background: #f04747; }
    .status-offline { background: #747f8d; }
    
    .activity-card {
        background: linear-gradient(135deg, rgba(30, 30, 40, 0.9), rgba(20, 20, 30, 0.9));
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .progress-bar {
        background: rgba(255, 255, 255, 0.1);
        height: 4px;
        border-radius: 2px;
        overflow: hidden;
    }
    
    .progress-fill {
        background: linear-gradient(90deg, #1db954, #1ed760);
        height: 100%;
        transition: width 0.3s ease;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .fade-in {
        animation: fadeIn 0.6s ease-out forwards;
    }
    
    .social-icon {
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .social-icon:hover {
        transform: translateY(-4px) scale(1.1);
        filter: brightness(1.2);
    }
    
    .spotify-green { color: #1DB954; }
    .youtube-red { color: #FF0000; }
    .instagram-pink { color: #E4405F; }
    .tiktok-white { color: #ffffff; }
    
    @media (max-width: 390px) {
        .card-container {
            margin: 1rem;
            width: calc(100% - 2rem);
        }
    }
</style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="bg-anime"></div>
    
    <div class="card-container w-full max-w-md relative z-10 fade-in">
        <!-- Main Profile Card -->
        <div class="bg-[#0d0d11] rounded-2xl overflow-hidden card-glow border border-zinc-900/50">
            <!-- Banner -->
            <div id="banner" class="h-32 bg-gradient-to-br from-purple-900 via-pink-900 to-blue-900 relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0d0d11] to-transparent opacity-60"></div>
            </div>
            
            <!-- Profile Content -->
            <div class="px-6 pb-6 relative">
                <!-- Avatar with Cat Ears -->
                <div class="relative -mt-16 mb-4 inline-block">
                    <div class="cat-ear left">
                        <div class="cat-ear-inner"></div>
                    </div>
                    <div class="cat-ear right">
                        <div class="cat-ear-inner"></div>
                    </div>
                    <div class="relative">
                        <img id="avatar" 
                             src="https://cdn.discordapp.com/embed/avatars/0.png" 
                             alt="Avatar" 
                             class="w-28 h-28 rounded-full avatar-glow object-cover bg-zinc-900">
                        <div id="status-dot" class="status-dot status-offline"></div>
                    </div>
                </div>
                
                <!-- Username & Bio -->
                <div class="mb-4">
                    <div class="flex items-center gap-2 mb-1 flex-wrap">
                        <h1 id="username" class="text-2xl font-bold text-white">Loading...</h1>
                        <span id="discriminator" class="text-gray-500 text-lg"></span>
                        <div class="flex gap-1">
                            <i class="fa-solid fa-star text-yellow-400 text-sm"></i>
                        </div>
                    </div>
                    <p id="custom-status" class="text-gray-400 text-sm italic">ig muts sabay sleep call</p>
                </div>
                
                <!-- Divider -->
                <div class="h-px bg-zinc-800 my-4"></div>
                
                <!-- Activity Section -->
                <div id="activity-container" class="mb-4">
                    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Activity</h2>
                    <div id="no-activity" class="text-gray-500 text-sm">Not playing anything</div>
                    
                    <!-- Spotify Activity -->
                    <div id="spotify-activity" class="activity-card rounded-xl p-4 hidden">
                        <div class="flex items-start gap-3">
                            <div class="relative flex-shrink-0">
                                <img id="album-art" src="" alt="Album" class="w-20 h-20 rounded-lg object-cover">
                                <div class="absolute -bottom-1 -right-1 bg-[#1DB954] rounded-full p-1.5">
                                    <i class="fab fa-spotify text-white text-xs"></i>
                                </div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-xs font-semibold text-[#1DB954] uppercase">Listening to Spotify</span>
                                </div>
                                <p id="song-name" class="text-white font-semibold text-sm truncate">Song Name</p>
                                <p id="song-artist" class="text-gray-400 text-xs truncate">Artist Name</p>
                                <p id="song-album" class="text-gray-500 text-xs truncate mt-0.5">Album Name</p>
                                
                                <!-- Progress Bar -->
                                <div class="mt-2">
                                    <div class="progress-bar">
                                        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                                    </div>
                                    <div class="flex justify-between mt-1">
                                        <span id="time-elapsed" class="text-gray-500 text-[10px]">0:00</span>
                                        <span id="time-total" class="text-gray-500 text-[10px]">0:00</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Game Activity -->
                    <div id="game-activity" class="activity-card rounded-xl p-4 hidden">
                        <div class="flex items-center gap-3">
                            <div class="bg-[#5865F2] rounded-lg p-3 flex-shrink-0">
                                <i class="fa-solid fa-gamepad text-white text-xl"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <span class="text-xs font-semibold text-[#5865F2] uppercase">Playing a game</span>
                                <p id="game-name" class="text-white font-semibold text-sm truncate mt-0.5">Game Name</p>
                                <p id="game-details" class="text-gray-400 text-xs truncate"></p>
                                <p id="game-state" class="text-gray-500 text-xs truncate"></p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Divider -->
                <div class="h-px bg-zinc-800 my-4"></div>
                
                <!-- Social Icons -->
                <div>
                    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Connections</h2>
                    <div class="flex gap-3 flex-wrap">
                        <a href="https://instagram.com" target="_blank" class="social-icon w-11 h-11 bg-zinc-900 hover:bg-zinc-800 rounded-xl flex items-center justify-center">
                            <i class="fab fa-instagram text-xl instagram-pink"></i>
                        </a>
                        <a href="https://tiktok.com" target="_blank" class="social-icon w-11 h-11 bg-zinc-900 hover:bg-zinc-800 rounded-xl flex items-center justify-center">
                            <i class="fab fa-tiktok text-xl tiktok-white"></i>
                        </a>
                        <a href="https://spotify.com" target="_blank" class="social-icon w-11 h-11 bg-zinc-900 hover:bg-zinc-800 rounded-xl flex items-center justify-center">
                            <i class="fab fa-spotify text-xl spotify-green"></i>
                        </a>
                        <a href="https://youtube.com" target="_blank" class="social-icon w-11 h-11 bg-zinc-900 hover:bg-zinc-800 rounded-xl flex items-center justify-center">
                            <i class="fab fa-youtube text-xl youtube-red"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center mt-4">
            <p class="text-gray-600 text-xs">Live via <span class="text-[#5865F2]">Lanyard API</span></p>
            <div id="connection-status" class="flex items-center justify-center gap-1.5 mt-1">
                <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
                <span class="text-gray-500 text-[10px]">Connecting...</span>
            </div>
        </div>
    </div>

<script>
    const USER_ID = '1250654354344775703';
    let ws = null;
    let spotifyInterval = null;
    
    // DOM Elements
    const avatar = document.getElementById('avatar');
    const banner = document.getElementById('banner');
    const username = document.getElementById('username');
    const discriminator = document.getElementById('discriminator');
    const customStatus = document.getElementById('custom-status');
    const statusDot = document.getElementById('status-dot');
    const noActivity = document.getElementById('no-activity');
    const spotifyActivity = document.getElementById('spotify-activity');
    const gameActivity = document.getElementById('game-activity');
    const connectionStatus = document.getElementById('connection-status');
    
    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }
    
    function updateSpotifyProgress(start, end) {
        if (spotifyInterval) clearInterval(spotifyInterval);
        
        const update = () => {
            const now = Date.now();
            const elapsed = now - start;
            const total = end - start;
            const progress = Math.min((elapsed / total) * 100, 100);
            
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('time-elapsed').textContent = formatTime(elapsed);
            document.getElementById('time-total').textContent = formatTime(total);
            
            if (progress >= 100) clearInterval(spotifyInterval);
        };
        
        update();
        spotifyInterval = setInterval(update, 1000);
    }
    
    function updateProfile(data) {
        const { discord_user, discord_status, activities, spotify, listening_to_spotify } = data;
        
        // Avatar
        if (discord_user.avatar) {
            const ext = discord_user.avatar.startsWith('a_') ? 'gif' : 'png';
            avatar.src = `https://cdn.discordapp.com/avatars/${USER_ID}/${discord_user.avatar}.${ext}?size=256`;
        } else {
            const defaultAvatar = discord_user.discriminator % 5;
            avatar.src = `https://cdn.discordapp.com/embed/avatars/${defaultAvatar}.png`;
        }
        
        // Banner
        if (discord_user.banner) {
            const ext = discord_user.banner.startsWith('a_') ? 'gif' : 'png';
            banner.style.backgroundImage = `url(https://cdn.discordapp.com/banners/${USER_ID}/${discord_user.banner}.${ext}?size=600)`;
            banner.style.backgroundSize = 'cover';
            banner.style.backgroundPosition = 'center';
        }
        
        // Username & Discriminator
        username.textContent = discord_user.global_name || discord_user.username;
        discriminator.textContent = discord_user.discriminator !== '0' ? `#${discord_user.discriminator}` : '';
        
        // Status
        statusDot.className = `status-dot status-${discord_status}`;
        
        // Custom Status
        const customActivity = activities.find(a => a.type === 4);
        if (customActivity && customActivity.state) {
            customStatus.textContent = customActivity.state;
            customStatus.classList.remove('hidden');
        } else {
            customStatus.textContent = 'ig muts sabay sleep call';
        }
        
        // Activities
        const gameActivityData = activities.find(a => a.type === 0);
        
        noActivity.classList.add('hidden');
        spotifyActivity.classList.add('hidden');
        gameActivity.classList.add('hidden');
        
        if (listening_to_spotify && spotify) {
            spotifyActivity.classList.remove('hidden');
            document.getElementById('album-art').src = spotify.album_art_url;
            document.getElementById('song-name').textContent = spotify.song;
            document.getElementById('song-artist').textContent = spotify.artist;
            document.getElementById('song-album').textContent = spotify.album;
            updateSpotifyProgress(spotify.timestamps.start, spotify.timestamps.end);
        } else if (gameActivityData) {
            gameActivity.classList.remove('hidden');
            document.getElementById('game-name').textContent = gameActivityData.name;
            document.getElementById('game-details').textContent = gameActivityData.details || '';
            document.getElementById('game-state').textContent = gameActivityData.state || '';
        } else {
            noActivity.classList.remove('hidden');
        }
    }
    
    function connectWebSocket() {
        ws = new WebSocket('wss://api.lanyard.rest/socket');
        
        ws.onopen = () => {
            connectionStatus.innerHTML = `
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <span class="text-gray-500 text-[10px]">Connected</span>
            `;
            ws.send(JSON.stringify({
                op: 2,
                d: { subscribe_to_id: USER_ID }
            }));
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.op === 1) {
                // Heartbeat
                setInterval(() => {
                    ws.send(JSON.stringify({ op: 3 }));
                }, data.d.heartbeat_interval);
            } else if (data.op === 0) {
                // Event
                if (data.t === 'INIT_STATE' || data.t === 'PRESENCE_UPDATE') {
                    updateProfile(data.d);
                }
            }
        };
        
        ws.onclose = () => {
            connectionStatus.innerHTML = `
                <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                <span class="text-gray-500 text-[10px]">Reconnecting...</span>
            `;
            if (spotifyInterval) clearInterval(spotifyInterval);
            setTimeout(connectWebSocket, 3000);
        };
        
        ws.onerror = () => {
            ws.close();
        };
    }
    
    // Initial fetch for instant load
    fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`)
        .then(res => res.json())
        .then(json => {
            if (json.success) updateProfile(json.data);
        })
        .catch(() => {});
    
    // Connect WebSocket for real-time updates
    connectWebSocket();
</script>

</body>
</html>
